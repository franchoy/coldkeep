version: "2"

run:
  timeout: 5m

linters:
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    revive:
      rules:
        - name: exported
        - name: var-naming

  default: none

  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errcheck
    - gofmt
    - revive

  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$