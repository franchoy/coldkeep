version: "1"

run:
  timeout: 3m

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errcheck

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck