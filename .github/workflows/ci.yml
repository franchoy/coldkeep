name: CI

on:
  push:
    branches: [ main, "release/**", "hotfix/**" ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify module
        run: go mod tidy && git diff --exit-code

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files detected:"
            echo "$unformatted"
            exit 1
          fi
          
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
    
      - name: Vet
        run: go vet ./...

      - name: Test packages (plain codec)
        env:
          COLDKEEP_CODEC: plain
        run: go test -race -count=1 ./cmd/... ./internal/...

      - name: Test packages (aes-gcm codec)
        env:
          COLDKEEP_CODEC: aes-gcm
          COLDKEEP_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: go test -race -count=1 ./cmd/... ./internal/...

      - name: Build packages
        run: go build ./...

      - name: Build CLI
        run: go build -o coldkeep ./cmd/coldkeep

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        codec: [plain, aes-gcm]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: coldkeep
          POSTGRES_PASSWORD: coldkeep
          POSTGRES_DB: coldkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coldkeep -d coldkeep"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run integration tests (correctness tier)
        env:
          COLDKEEP_TEST_DB: 1
          COLDKEEP_CODEC: ${{ matrix.codec }}
          COLDKEEP_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: coldkeep
          DB_PASSWORD: coldkeep
          DB_NAME: coldkeep
          DB_SSLMODE: disable
        run: go test -count=1 -short ./tests/...

  smoke:
    runs-on: ubuntu-latest
    needs: [quality, integration]
    strategy:
      fail-fast: false
      matrix:
        codec: [plain, aes-gcm]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: coldkeep
          POSTGRES_PASSWORD: coldkeep
          POSTGRES_DB: coldkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coldkeep -d coldkeep"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build CLI
        run: go build -o coldkeep ./cmd/coldkeep

      - name: Run smoke script
        env:
          COLDKEEP_TEST_DB: 1
          COLDKEEP_CODEC: ${{ matrix.codec }}
          COLDKEEP_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: coldkeep
          DB_PASSWORD: coldkeep
          DB_NAME: coldkeep
          DB_SSLMODE: disable
          COLDKEEP_STORAGE_DIR: ${{ github.workspace }}/.ci-storage/${{ matrix.codec }}
        run: PATH="$PWD:$PATH" bash scripts/smoke.sh
