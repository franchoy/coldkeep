name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify module
        run: go mod tidy && git diff --exit-code

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files detected:"
            echo "$unformatted"
            exit 1
          fi
          
      - name: Lint
        uses: golangci/golangci-lint-action@v6
    
      - name: Vet
        run: go vet ./...

      - name: Test plain no-codec (race enabled)
        env:
          COLDKEEP_CODEC: plain
        run: go test -race -count=1 ./...
        
      - name: Test aes-gcm codec (race enabled)
        env:
          COLDKEEP_CODEC: aes-gcm
          COLDKEEP_KEY: ${{ secrets.COLDKEEP_KEY }}
        run: go test -race -count=1 ./...

      - name: Build packages
        run: go build ./...

      - name: Build CLI
        run: go build -o coldkeep ./cmd/coldkeep
