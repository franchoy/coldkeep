name: CI

on:
  push:
    branches: [ main, "release/**", "hotfix/**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  merge_group:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Keep Go caching centralized in setup-go (cache: true); avoid adding a
      # second actions/cache layer for go-build or module paths unless measured.
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify module
        run: go mod tidy && git diff --exit-code

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files detected:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check shell script syntax
        run: bash -n scripts/*.sh
          
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.6.2
    
      - name: Vet
        run: go vet ./...

      - name: Test packages (plain codec)
        env:
          COLDKEEP_CODEC: plain
        run: go test -race -count=1 ./cmd/... ./internal/...

      - name: Test packages (aes-gcm codec)
        env:
          COLDKEEP_CODEC: aes-gcm
          COLDKEEP_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: go test -race -count=1 ./cmd/... ./internal/...

      - name: Build packages
        run: go build ./...

      - name: Audit CI invariants (local)
        run: bash scripts/audit_ci_enforcement.sh --local-only

      - name: Build CLI
        run: go build -o coldkeep ./cmd/coldkeep

  integration-correctness:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        codec: [plain, aes-gcm]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: coldkeep
          POSTGRES_PASSWORD: coldkeep
          POSTGRES_DB: coldkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coldkeep -d coldkeep"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run integration tests (correctness tier)
        env:
          COLDKEEP_TEST_DB: 1
          COLDKEEP_CODEC: ${{ matrix.codec }}
          COLDKEEP_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: coldkeep
          DB_PASSWORD: coldkeep
          DB_NAME: coldkeep
          DB_SSLMODE: disable
        run: go test -race -count=1 -short ./tests/...

  integration-stress:
    runs-on: ubuntu-latest
    needs: integration-correctness
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        codec: [plain, aes-gcm]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: coldkeep
          POSTGRES_PASSWORD: coldkeep
          POSTGRES_DB: coldkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coldkeep -d coldkeep"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run integration tests (standard stress tier)
        env:
          COLDKEEP_TEST_DB: 1
          COLDKEEP_CODEC: ${{ matrix.codec }}
          COLDKEEP_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: coldkeep
          DB_PASSWORD: coldkeep
          DB_NAME: coldkeep
          DB_SSLMODE: disable
        run: go test -race -count=1 ./tests/...

  integration-long-run:
    runs-on: ubuntu-latest
    needs: integration-stress
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        codec: [plain, aes-gcm]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: coldkeep
          POSTGRES_PASSWORD: coldkeep
          POSTGRES_DB: coldkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coldkeep -d coldkeep"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run dedicated long-run stability test
        env:
          COLDKEEP_TEST_DB: 1
          COLDKEEP_LONG_RUN: 1
          COLDKEEP_CODEC: ${{ matrix.codec }}
          COLDKEEP_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: coldkeep
          DB_PASSWORD: coldkeep
          DB_NAME: coldkeep
          DB_SSLMODE: disable
        run: go test -race -count=1 ./tests -run TestStoreGCVerifyRestoreDeleteLoopStability

  smoke:
    runs-on: ubuntu-latest
    needs: [quality, integration-correctness]
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        codec: [plain, aes-gcm]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: coldkeep
          POSTGRES_PASSWORD: coldkeep
          POSTGRES_DB: coldkeep
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U coldkeep -d coldkeep"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build CLI
        run: go build -o coldkeep ./cmd/coldkeep

      - name: Run smoke script
        env:
          COLDKEEP_TEST_DB: 1
          COLDKEEP_CODEC: ${{ matrix.codec }}
          COLDKEEP_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USER: coldkeep
          DB_PASSWORD: coldkeep
          DB_NAME: coldkeep
          DB_SSLMODE: disable
          COLDKEEP_STORAGE_DIR: ${{ github.workspace }}/.ci-storage/${{ matrix.codec }}
          COLDKEEP_SMOKE_RESET_DB: 1
          COLDKEEP_SMOKE_SCHEMA_MESSAGE_GATE: 1
        run: PATH="$PWD:$PATH" bash scripts/smoke.sh

      - name: Upload smoke artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts-${{ matrix.codec }}
          path: ${{ github.workspace }}/.ci-storage/${{ matrix.codec }}
          if-no-files-found: ignore

  ci-required:
    name: CI Required Gate
    runs-on: ubuntu-latest
    needs: [quality, integration-correctness, integration-stress, smoke]
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - name: Evaluate upstream jobs
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          INTEGRATION_CORRECTNESS_RESULT: ${{ needs.integration-correctness.result }}
          INTEGRATION_STRESS_RESULT: ${{ needs.integration-stress.result }}
          SMOKE_RESULT: ${{ needs.smoke.result }}
        run: |
          echo "quality=${QUALITY_RESULT}"
          echo "integration-correctness=${INTEGRATION_CORRECTNESS_RESULT}"
          echo "integration-stress=${INTEGRATION_STRESS_RESULT}"
          echo "smoke=${SMOKE_RESULT}"

          if [ "${QUALITY_RESULT}" != "success" ] || \
             [ "${INTEGRATION_CORRECTNESS_RESULT}" != "success" ] || \
             [ "${INTEGRATION_STRESS_RESULT}" != "success" ] || \
             [ "${SMOKE_RESULT}" != "success" ]; then
            echo "One or more required jobs failed or were skipped."
            exit 1
          fi
