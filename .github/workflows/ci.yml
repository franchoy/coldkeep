name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Verify module
        run: go mod tidy && git diff --exit-code

      - name: Check formatting
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "The following files are not properly formatted:"
            echo "$fmt"
            echo ""
            echo "Run: gofmt -w ."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race enabled)
        run: go test -race ./...

      - name: Build packages
        run: go build ./...

      - name: Build CLI
        run: go build -o coldkeep ./cmd/coldkeep
